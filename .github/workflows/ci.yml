name: cicd-pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]
        uv-version: [ "0.10.11" ]
        os: [ "ubuntu-22.04" ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${{ matrix.uv-version }}"
          uv --version

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
            src/.venv
          key: ${{ runner.os }}-py${{ matrix.python-version }}-uv-${{ hashFiles('src/uv.lock') }}

      - name: Sync dependencies
        working-directory: ./src
        run: |
          uv sync --all-groups

      - name: Run pre-commit hooks (including tests)
        working-directory: ./src
        run: |
          uv run pre-commit run -vvv --all-files

      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.12' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
