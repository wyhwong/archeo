name: pypi-release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  release:
    environment: release
    strategy:
      matrix:
        python-version: [ "3.11" ]
        uv-version: [ "0.10.11" ]
        os: [ "ubuntu-22.04" ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install "uv==${{ matrix.uv-version }}"
          uv --version

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
            src/.venv
          key: ${{ runner.os }}-py${{ matrix.python-version }}-uv-${{ hashFiles('src/uv.lock') }}

      - name: Sync dependencies (dev tools)
        working-directory: ./src
        run: |
          uv sync --group dev

      - name: Build
        working-directory: ./src
        run: |
          uv build

      - name: Publish to PyPI
        working-directory: ./src
        env:
          UV_PUBLISH_USERNAME: __token__
          UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish --skip-existing
